<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتشف الشبكة 1.2</title>
<link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Changa',sans-serif}body{background-color:#0d1117;color:#c9d1d9;padding:15px;line-height:1.4}header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#161b22;border-radius:12px;margin-bottom:20px;border:1px solid #30363d}h1{font-size:1.4rem;color:#a855f7}#refresh-btn{background:#238636;color:#fff;border:none;padding:8px 15px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:700}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px}.card{background:#161b22;border:1px solid #30363d;padding:18px;border-radius:12px;position:relative}.card h2{font-size:1.1rem;color:#facc15;margin-bottom:15px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d;padding-bottom:8px}.info-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:0.95rem}.label{color:#8b949e;display:flex;align-items:center;gap:6px}.value{color:#fff;font-weight:700;text-align:left}.flag-img{height:18px;vertical-align:middle;border-radius:2px;margin-right:5px}.status-tag{padding:2px 10px;border-radius:20px;font-size:0.8rem;font-weight:700}.tag-yes{background:rgba(52,211,153,0.1);color:#34d399}.tag-no{background:rgba(248,113,113,0.1);color:#f87171}#map-trigger{background:#30363d;color:#fff;text-align:center;padding:15px;border-radius:10px;cursor:pointer;margin-top:10px;border:2px dashed #484f58;transition:0.3s}#map-trigger:hover{background:#484f58;border-color:#a855f7}#map{height:250px;width:100%;border-radius:10px;margin-top:10px;display:none;border:1px solid #a855f7}
</style>
</head>
<body>
<div class="container">
<header>
<h1><i class="fas fa-radar"></i> رادار الشبكة</h1>
<button id="refresh-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i> تحديث</button>
</header>
<div id="loader" style="text-align:center;padding:50px;color:#a855f7;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
<div id="content" class="grid" style="display:none">
<div class="card">
<h2><i class="fas fa-network-wired"></i> اتصال الإنترنت</h2>
<div class="info-row"><span class="label"><i class="fas fa-fingerprint"></i> IP:</span><span class="value" id="ip">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-server"></i> المزود (ISP):</span><span class="value" id="isp">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-route"></i> ASN:</span><span class="value" id="asn">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-bolt"></i> السرعة التقريبية:</span><span class="value" id="downlink">-</span></div>
</div>
<div class="card">
<h2><i class="fas fa-map-marker-alt"></i> البيانات الجغرافية</h2>
<div class="info-row"><span class="label"><i class="fas fa-flag"></i> الدولة:</span><span class="value" id="country">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-city"></i> المدينة:</span><span class="value" id="city">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-clock"></i> التوقيت:</span><span class="value" id="timezone">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-coins"></i> العملة:</span><span class="value" id="currency">-</span></div>
<div id="map-trigger" onclick="loadMap()"><i class="fas fa-map-marked-alt"></i> انقر لعرض الموقع على الخريطة</div>
<div id="map"></div>
</div>
<div class="card">
<h2><i class="fas fa-shield-halved"></i> الأمان والخصوصية</h2>
<div class="info-row"><span class="label"><i class="fas fa-user-secret"></i> Proxy/VPN:</span><span id="is_proxy" class="value">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-building"></i> مركز بيانات:</span><span id="is_hosting" class="value">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-mobile-alt"></i> بيانات خلوي:</span><span id="is_mobile" class="value">-</span></div>
</div>
<div class="card">
<h2><i class="fas fa-microchip"></i> بيانات العتاد والبطارية</h2>
<div class="info-row"><span class="label"><i class="fas fa-battery-three-quarters"></i> مستوى الشحن:</span><span class="value" id="battery">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-memory"></i> المعالج (Cores):</span><span class="value" id="cpu">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-desktop"></i> الشاشة:</span><span class="value" id="screen">-</span></div>
<div class="info-row"><span class="label"><i class="fas fa-window-maximize"></i> المتصفح:</span><span class="value" id="browser">-</span></div>
</div>
</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let userLat, userLon;

async function getAllData() {
    try {
        // استخدام API لجلب البيانات الجغرافية والتقنية
        const res = await fetch('http://ip-api.com/json/?fields=66846719');
        const data = await res.json();
        
        if (data.status === 'success') {
            userLat = data.lat;
            userLon = data.lon;
            renderUI(data);
        }
    } catch (e) {
        document.getElementById('loader').innerHTML = "فشل في تحميل البيانات";
    }
}

function renderUI(data) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('content').style.display = 'grid';

    // بيانات الشبكة
    document.getElementById('ip').innerText = data.query;
    document.getElementById('isp').innerText = data.isp;
    document.getElementById('asn').innerText = data.as;
    
    // بيانات الجغرافيا مع العلم
    const flagUrl = `https://flagcdn.com/32x24/${data.countryCode.toLowerCase()}.png`;
    document.getElementById('country').innerHTML = `<img src="${flagUrl}" class="flag-img"> ${data.country}`;
    document.getElementById('city').innerText = data.city;
    document.getElementById('timezone').innerText = data.timezone;
    document.getElementById('currency').innerText = data.currency || 'غير متوفر';

    // الأمان
    const check = (val) => val ? '<span class="status-tag tag-yes">نعم</span>' : '<span class="status-tag tag-no">لا</span>';
    document.getElementById('is_proxy').innerHTML = check(data.proxy);
    document.getElementById('is_hosting').innerHTML = check(data.hosting);
    document.getElementById('is_mobile').innerHTML = check(data.mobile);

    // العتاد والمتصفح
    document.getElementById('cpu').innerText = `${navigator.hardwareConcurrency || 'N/A'} Cores`;
    document.getElementById('screen').innerText = `${window.screen.width} x ${window.screen.height}`;
    document.getElementById('browser').innerText = navigator.userAgent.split(' ')[0];
    
    // بيانات إضافية: البطارية والسرعة
    if (navigator.getBattery) {
        navigator.getBattery().then(batt => {
            document.getElementById('battery').innerText = `${Math.round(batt.level * 100)}% (${batt.charging ? 'جاري الشحن' : 'تفريغ'})`;
        });
    }

    if (navigator.connection) {
        document.getElementById('downlink').innerText = `${navigator.connection.downlink} Mbps`;
    }
}

function loadMap() {
    document.getElementById('map-trigger').style.display = 'none';
    const mapDiv = document.getElementById('map');
    mapDiv.style.display = 'block';

    const map = L.map('map').setView([userLat, userLon], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([userLat, userLon]).addTo(map)
        .bindPopup('موقع الاتصال التقريبي')
        .openPopup();
}

getAllData();
</script>
</body>
</html>
