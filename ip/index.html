<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيانات الشبكة v1.4</title>
<link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Changa',sans-serif}body{background-color:#0d1117;color:#c9d1d9;padding:10px;line-height:1.2;font-size:0.85rem}header{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#161b22;border-radius:8px;margin-bottom:15px;border:1px solid #30363d}h1{font-size:1.1rem;color:#a855f7}#refresh-btn{background:#238636;color:#fff;border:none;padding:5px 12px;border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:0.8rem;font-weight:700}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}.card{background:#161b22;border:1px solid #30363d;padding:15px;border-radius:10px}.card h2{font-size:0.95rem;color:#facc15;margin-bottom:12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #30363d;padding-bottom:5px}.info-row{display:flex;justify-content:space-between;margin-bottom:8px}.label{color:#8b949e;display:flex;align-items:center;gap:5px}.value{color:#fff;font-weight:700;text-align:left;word-break:break-all}.flag-box{width:30px;height:18px;border-radius:3px;overflow:hidden;border:1px solid #484f58;display:inline-block;vertical-align:middle}.flag-box img{width:100%;height:100%;object-fit:cover}#map{height:180px;width:100%;border-radius:8px;margin-top:10px;display:none;border:1px solid #a855f7}
</style>
</head>
<body>
<header>
<h1><i class="fas fa-broadcast-tower"></i> رادار الشبكة</h1>
<button id="refresh-btn" onclick="updateOnlyData()"><i class="fas fa-sync-alt" id="sync-icon"></i> تحديث شامل</button>
</header>
<div id="loader" style="text-align:center;padding:40px;color:#a855f7;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
<div id="content" class="grid" style="display:none">
<div class="card">
<h2><i class="fas fa-network-wired"></i> بروتوكولات الإتصال</h2>
<div class="info-row"><span class="label">IPv4:</span><span class="value" id="ipv4">...</span></div>
<div class="info-row"><span class="label">IPv6:</span><span class="value" id="ipv6">...</span></div>
<div class="info-row"><span class="label">المزود (ISP):</span><span class="value" id="isp">-</span></div>
<div class="info-row"><span class="label">الاستجابة:</span><span class="value" id="ping">-</span></div>
<div class="info-row"><span class="label">السرعة:</span><span class="value" id="downlink">-</span></div>
</div>
<div class="card">
<h2><i class="fas fa-map-marked-alt"></i> الموقع والتوقيت</h2>
<div class="info-row"><span class="label">الدولة:</span><span class="value" id="country">-</span></div>
<div class="info-row"><span class="label">المدينة:</span><span class="value" id="city">-</span></div>
<div class="info-row"><span class="label">العملة:</span><span class="value" id="currency">-</span></div>
<div class="info-row"><span class="label">المنطقة الزمنية:</span><span class="value" id="timezone_name">-</span></div>
<div class="info-row"><span class="label">توقيت المنطقة:</span><span class="value" id="live_clock" style="color:#facc15">-</span></div>
<div id="map"></div>
</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let userLat, userLon, clockInterval, speedInterval, remoteOffset = 0;
async function fetchIPs() {
try {
const [v4, v6] = await Promise.all([
fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: 'N/A'})),
fetch('https://api64.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: 'N/A'}))
]);
document.getElementById('ipv4').innerText = v4.ip;
document.getElementById('ipv6').innerText = v6.ip === v4.ip ? 'غير مدعوم' : v6.ip;
} catch (e) {}
}
async function getAllData() {
try {
const start = Date.now();
await fetchIPs();
const proxy = 'https://corsproxy.io/?';
const target = encodeURIComponent('http://ip-api.com/json/?fields=66846719&t=' + Date.now());
const res = await fetch(proxy + target);
const data = await res.json();
const pingValue = Date.now() - start;
if (data.status === 'success') {
userLat = data.lat; userLon = data.lon;
remoteOffset = data.offset; 
renderUI(data, pingValue);
}
} catch (e) { document.getElementById('loader').innerText = "خطأ في الشبكة"; }
}
function renderUI(data, ping, realIP) {
document.getElementById('loader').style.display = 'none';
document.getElementById('content').style.display = 'grid';
document.getElementById('isp').innerText = data.isp;
document.getElementById('ping').innerText = ping + ' ms';
const flagUrl = `https://flagcdn.com/w40/${data.countryCode.toLowerCase()}.png`;
document.getElementById('country').innerHTML = `<span class="flag-box"><img src="${flagUrl}"></span> ${data.country}`;
document.getElementById('city').innerText = data.city;
document.getElementById('currency').innerText = data.currency || 'N/A';
document.getElementById('timezone_name').innerText = data.timezone;
startLiveElements();
loadMap();
}
function startLiveElements() {
if(clockInterval) clearInterval(clockInterval);
clockInterval = setInterval(() => {
const utc = new Date().getTime() + (new Date().getTimezoneOffset() * 60000);
const remoteTime = new Date(utc + (remoteOffset * 1000));
const fmt = (n) => String(n).padStart(2, '0');
const d = `${remoteTime.getFullYear()}/${fmt(remoteTime.getMonth()+1)}/${fmt(remoteTime.getDate())}`;
let h = remoteTime.getHours(); const m = h >= 12 ? 'م' : 'ص'; h = h % 12 || 12;
const t = `${fmt(h)}:${fmt(remoteTime.getMinutes())}:${fmt(remoteTime.getSeconds())} ${m}`;
document.getElementById('live_clock').innerText = `${t} - ${d}`;
}, 1000);
if(speedInterval) clearInterval(speedInterval);
speedInterval = setInterval(async () => {
if (navigator.connection) {
document.getElementById('downlink').innerText = (navigator.connection.downlink + (Math.random()*0.02)).toFixed(2) + ' Mbps';
}
const s = Date.now();
await fetch('https://api.ipify.org?t=' + s, { mode: 'no-cors' });
document.getElementById('ping').innerText = (Date.now() - s) + ' ms';
}, 1500);
}
function updateOnlyData() {
const icon = document.getElementById('sync-icon');
icon.classList.add('fa-spin');
getAllData().then(() => setTimeout(() => icon.classList.remove('fa-spin'), 600));
}
function loadMap() {
const mapDiv = document.getElementById('map'); mapDiv.style.display = 'block';
if (window.myMap) window.myMap.remove();
window.myMap = L.map('map').setView([userLat, userLon], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(window.myMap);
L.marker([userLat, userLon]).addTo(window.myMap);
}
getAllData();
</script>
</body>
</html>
